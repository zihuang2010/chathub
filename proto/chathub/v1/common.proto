// proto/chathub/v1/common.proto
syntax = "proto3";
package chathub.v1;

// Plan 7 — Mention / ReplyToRef / RemoteId / MessageBody 等都已删除(只服务于已删除的 IncomingMsg / SendRequest / HistoryMessage)。
// 现仅保留 UserProfile + WecomAccount,均被 auth.proto 的 LoginResponse 引用。

message UserProfile {
  string user_id      = 1;   // Relay 内部 user id
  string display_name = 2;   // 即业务后台 nickName
  string avatar_url   = 3;
  string role         = 4;   // "operator" | "admin"
  string tenant_id    = 5;
  string username     = 6;   // 登录用户名(JddTokenVO.username)
  string mobile       = 7;   // 手机号(JddTokenVO.mobile)
}

message WecomAccount {
  string wecom_account_id = 1;   // Relay 内部账号 id
  string corp_id          = 2;   // 企微 corpid
  uint32 agent_id         = 3;   // 企微 agentid
  string display_name     = 4;
  bool   enabled          = 5;
}
