// proto/chathub/v1/hub.proto
syntax = "proto3";
package chathub.v1;

import "chathub/v1/event.proto";

// Hub service(Plan 7 — legacy 全删,只剩 v2 三件套)。
//
// - Subscribe:一员工一长连接,SubscribeAck 首帧 + PushBatchOut 实时帧 + SystemSignal 控制帧
// - Ack:客户端处理完一批后上报 notify_seq 水位(per-employee,身份从 token 取)
// - Forward:所有业务 RPC(send / recall / ack_read / fetch_history / 未来新增)的单一透传入口
//
// 加新业务 RPC 不需要改 proto;改 `RELAY_PATH_<METHOD>` env 即可。
service Hub {
  rpc Subscribe(SubscribeRequest) returns (stream ServerEvent);
  rpc Ack      (AckRequest)       returns (AckResponse);
  rpc Forward  (ForwardRequest)   returns (ForwardResponse);
}

message SubscribeRequest {
  // employee 维度的续点游标(0=首连只接实时;>0=重放 > 该 seq 的事件)。
  uint64 since_notify_seq = 1;
  // 客户端生成 + 持久化的设备标识(供业务后台 force_close 定向)。
  string device_id        = 2;
  // 客户端业务版本(协议版本仍由 metadata `chathub-client-version` 传)。
  string client_version   = 3;
  // 客户端登录后从 LoginResponse 拿到、持久化的 terminalId(= relay OAuth 时按
  // terminal_id_for(device_id, username) 派生的 UUIDv5)。每次 subscribe 回带,
  // relay 据此做 force_close 终端粒度路由(排他登录只踢旧端、保留新端)。
  string terminal_id      = 4;
}

// 客户端处理完一批事件后上报已处理水位。仅 relay 内部观测;事件日志清理走 TTL,不依赖此值。
message AckRequest {
  uint64 notify_seq = 1;
}
message AckResponse {}

// 业务 RPC 透传统一入口。Relay 不解析 body_json,按 method 查 DownstreamRoutes
// 拼路径 POST 到业务后台。REST 隧道语义(P0-5):
//   - 2xx → ForwardResponse{body, http_status}
//   - 4xx → 同样 Ok(REST 风格透传),客户端按 http_status 自行判断业务错
//   - 5xx → Status::Internal
//   - 网络/超时 → Status::Unavailable
message ForwardRequest {
  string method    = 1;   // "send" / "recall" / "ack_read" / "fetch_history" / "list_accounts" / 未来新增
  bytes  body_json = 2;   // 业务请求 JSON 原文,relay 透传(GET 路径 relay 会丢弃 body)
  // 查询参数 — GET 路径专用(relay 拼到 URL query string;POST 路径忽略)。
  // 空 map = 不传。值已 raw,relay 内部用 reqwest .query() 自动 URL-encode。
  map<string,string> query = 3;
}
message ForwardResponse {
  bytes  body_json   = 1;   // 业务响应 JSON 原文,客户端 SDK 自己 deserialize
  uint32 http_status = 2;   // 业务后台返回的 HTTP 状态码(见上 REST 隧道说明)
}
