// proto/chathub/v1/hub.proto
syntax = "proto3";
package chathub.v1;

import "chathub/v1/event.proto";
import "chathub/v1/message.proto";

// Hub service:Plan 3 起 Subscribe + Send;Plan 4 起 Recall + AckRead + FetchHistory。
// Plan 6 起 Ack(notify_seq 水位)+ Forward(业务 RPC 单一透传,Z 架构)。
// 旧的 Send/Recall/AckRead/FetchHistory 保留为兼容,callers 切到 Forward 后 cleanup。
service Hub {
  rpc Subscribe   (SubscribeRequest)    returns (stream ServerEvent);
  // Plan 6 新增 ─────────────────────────────────────────
  rpc Ack         (AckRequest)          returns (AckResponse);
  rpc Forward     (ForwardRequest)      returns (ForwardResponse);
  // 兼容期保留(阶段 5 删除):
  rpc Send        (SendRequest)         returns (SendResponse);
  rpc Recall      (RecallRequest)       returns (RecallResponse);
  rpc AckRead     (AckReadRequest)      returns (AckReadResponse);
  rpc FetchHistory(FetchHistoryRequest) returns (FetchHistoryResponse);
}

message SubscribeRequest {
  // 旧:per-wecom-account seq map(兼容期保留,Plan 6 起客户端走 since_notify_seq)。
  map<string, int64> since_seqs = 1;
  // Plan 6 新增:employee 维度的续点游标(0=首连只接实时;>0=重放 > 该 seq 的事件)。
  uint64 since_notify_seq       = 2;
  // 客户端生成 + 持久化的设备标识(供业务后台 force_close 定向)。
  string device_id              = 3;
  // 客户端业务版本(协议版本仍由 metadata chathub-client-version 传)。
  string client_version         = 4;
}

// Plan 6 — 客户端处理完一批事件后上报已处理水位(per-employee 维度,身份从 token 取)。
// 仅用于 relay 内部观测;不参与事件日志清理(清理走 TTL)。
message AckRequest {
  uint64 notify_seq = 1;
}
message AckResponse {}

// Plan 6 — 业务 RPC 透传统一入口。Relay 不解析 body_json,按 method 查 DownstreamRoutes
// 拼路径 POST 到业务后台。HTTP 错误 → gRPC Status 映射:
//   401 Unauthenticated / 403 PermissionDenied / 4xx InvalidArgument / 5xx Internal /
//   网络/超时 Unavailable。
message ForwardRequest {
  string method    = 1;   // "send" / "recall" / "ack_read" / "fetch_history" / 未来新增
  bytes  body_json = 2;   // 业务请求 JSON 原文,relay 透传
}
message ForwardResponse {
  bytes  body_json = 1;   // 业务响应 JSON 原文,客户端 SDK 自己 deserialize
}

message SendRequest {
  string wecom_account_id = 1;
  string conversation_id  = 2;
  string client_msg_id    = 3;
  MessageBody body        = 4;
}
message SendResponse {
  string server_msg_id = 1;
  int64  sent_at_ms    = 2;
}

// Plan 4 — 撤回:by server_msg_id,无 reason
message RecallRequest {
  string wecom_account_id = 1;
  string conversation_id  = 2;
  string server_msg_id    = 3;
}
message RecallResponse {
  int64 recalled_at_ms = 1;
}

// Plan 4 — 读回执:batched 语义("已读到这条及之前的全部")
message AckReadRequest {
  string wecom_account_id        = 1;
  string conversation_id         = 2;
  string last_read_server_msg_id = 3;
}
message AckReadResponse {
  int64 acked_at_ms = 1;
}

// Plan 4 — 历史拉取:opaque cursor 分页
message FetchHistoryRequest {
  string wecom_account_id = 1;
  string conversation_id  = 2;
  uint32 limit            = 3;   // 客户端 ≤ 100;0 视为默认(由服务端决定)
  string cursor           = 4;   // 空 = 从最新开始;服务端 echo next_cursor
}
message FetchHistoryResponse {
  repeated HistoryMessage messages = 1;   // 升序按 sent_at_ms
  string next_cursor               = 2;   // 空 = 无更早历史
}
message HistoryMessage {
  string conversation_id = 1;
  string from_user_id    = 2;
  MessageBody body       = 3;
  int64  sent_at_ms      = 4;
  string server_msg_id   = 5;
  bool   recalled        = 6;   // 已撤回的也返回,客户端展示占位"消息已撤回"
}
