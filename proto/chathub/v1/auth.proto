// proto/chathub/v1/auth.proto
syntax = "proto3";
package chathub.v1;

import "chathub/v1/common.proto";

// Auth service:method 全部不要求 access_token,但要求 chathub-protocol-version
// 与 chathub-client-version metadata。Relay 仅透传到业务后台,不签发、不存储。
service Auth {
  rpc Login  (LoginRequest)  returns (LoginResponse);
  rpc Logout (LogoutRequest) returns (LogoutResponse);
}

message LoginRequest {
  string username    = 1;
  string password    = 2;
  string device_id   = 3;   // Tauri 安装唯一 id
  string device_name = 4;   // "Bob 的 MacBook"
  string client_ver  = 5;   // 与 metadata 中 chathub-client-version 必须一致
}

message LoginResponse {
  string access_token = 1;   // 业务后台签发的 token,Relay 透传不解析
  UserProfile user    = 2;
  repeated WecomAccount wecom_accounts = 3;
}

message LogoutRequest  { string token = 1; }
message LogoutResponse {}
