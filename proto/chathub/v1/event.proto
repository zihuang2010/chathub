// proto/chathub/v1/event.proto
syntax = "proto3";
package chathub.v1;

// Plan 7 — legacy oneof 变体全删,只剩 v2 三件套:
//   - PushBatchOut(数据帧)
//   - SubscribeAck(首帧)
//   - SystemSignal(控制帧:SERVER_DRAIN / RESYNC_REQUIRED)
//
// 旧的 IncomingMsg / MessageRecalled / ReadReceipt / MessageStatusChange / KIND_KICKED 已删除。
message ServerEvent {
  oneof body {
    PushBatchOut push_batch    = 1;   // 业务事件批次(events_json 原文透传)
    SubscribeAck subscribe_ack = 2;   // Subscribe 首帧:重放范围 + resync_required
    SystemSignal system        = 3;   // 控制信号
  }
}

// 业务事件批次(对应 docs/工具网关通知事件与字段规范.md 的外层通知包)。
// 由 relay 接 POST /internal/push/v2 后 fanout 给 employee 的 Subscribe 流。
message PushBatchOut {
  uint64 notify_seq   = 1;   // 业务后台分配,客户端续点游标
  string client_id    = 2;   // 固定 "rh_wxchat"(本期)
  int64  employee_id  = 3;   // 目标员工
  string batch_id     = 4;   // 业务后台分配,便于排查
  string batch_time   = 5;   // "yyyy-MM-dd HH:mm:ss"
  string device_id    = 6;   // relay 附上(取自 ConnectionEntry,标识投到了哪台设备)
  bytes  events_json  = 7;   // events[] 数组的 JSON 原文;客户端 JSON.parse 后按 eventType 分支
}

// Subscribe 首帧。
message SubscribeAck {
  uint64 resumed_from_seq = 1;   // == request.since_notify_seq
  uint64 replayed_to_seq  = 2;   // 重放到的最高 notify_seq(进入实时模式前)
  bool   resync_required  = 3;   // true 时客户端走 recentFriends/message/history 兜底
  string resync_reason    = 4;
}

message SystemSignal {
  enum Kind {
    KIND_UNSPECIFIED      = 0;
    KIND_SERVER_DRAIN     = 1;   // graceful shutdown 时广播,客户端主动断 + 重连(纯连接层事件)
    // 事件日志窗口或反压问题,客户端走兜底 REST API 全量重拉(数据同步层事件)。
    //
    // 【契约约束 2026-06-03 — 连接/同步解耦】客户端已改为"完全单向隔离":收到实时
    // RESYNC_REQUIRED 只触发 REST 软重拉,**不再断连重订阅**。因此 relay 侧:
    //   1) 当前**不得**通过实时流主动下发 KIND_RESYNC_REQUIRED(实时控制信号仅 SERVER_DRAIN);
    //      resync 语义请继续通过 Subscribe 首帧 SubscribeAck.resync_required 表达;
    //   2) 若未来确需实时下发,必须保证下发后**在同一连接上继续推送 head 之后的实时帧**
    //      (不得要求客户端重连重锚水位)——否则不断连的客户端会丢失 notify_seq 水位重锚点,
    //      未打开会话/温缓存的 head−old 残余缺口将失去收敛点(见解耦设计 D3)。
    KIND_RESYNC_REQUIRED  = 2;
    // relay 周期下发的流保活帧;客户端仅用于重置静默看门狗(判活),不入库/不动水位/不触发 resync。
    // 被路由表摘除的连接自然收不到心跳 → 客户端看门狗到点 → 静默重连。
    KIND_HEARTBEAT        = 3;
  }
  Kind   kind   = 1;
  string detail = 2;
}
