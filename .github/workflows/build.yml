name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: verify versions agree (and match tag if pushed)
        id: v
        shell: bash
        run: |
          set -euo pipefail
          PKG_VER=$(node -p "require('./package.json').version")
          TAURI_VER=$(node -p "require('./backends/tauri.conf.json').version")
          CARGO_VER=$(grep -m1 '^version = ' backends/Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          echo "package.json:    $PKG_VER"
          echo "tauri.conf.json: $TAURI_VER"
          echo "Cargo.toml:      $CARGO_VER"

          if [ "$PKG_VER" != "$TAURI_VER" ] || [ "$PKG_VER" != "$CARGO_VER" ]; then
            echo "::error::version mismatch: package.json=$PKG_VER tauri.conf.json=$TAURI_VER Cargo.toml=$CARGO_VER (run: pnpm version:bump <semver>)"
            exit 1
          fi

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            TAG_VER="${GITHUB_REF_NAME#v}"
            if [ "$PKG_VER" != "$TAG_VER" ]; then
              echo "::error::tag $GITHUB_REF_NAME does not match version $PKG_VER (expected tag v$PKG_VER)"
              exit 1
            fi
            echo "tag $GITHUB_REF_NAME matches version $PKG_VER"
          else
            echo "manual dispatch: skipping tag/version match check"
          fi

          echo "version=$PKG_VER" >> "$GITHUB_OUTPUT"

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-14 是 Apple Silicon runner，arm64 原生构建
          - os: macos-14
            target: aarch64-apple-darwin
            label: macos-arm64
            bundles: "app,dmg"
          # 同样 macos-14 跑，cross-compile 到 x86_64（避开 macos-13 排队）
          - os: macos-14
            target: x86_64-apple-darwin
            label: macos-x86_64
            bundles: "app,dmg"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
            bundles: "nsis"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: backends -> target
          key: ${{ matrix.target }}

      - run: pnpm install --frozen-lockfile

      - name: tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: list bundle dir (diagnostic)
        shell: bash
        run: |
          set -euo pipefail
          BD="backends/target/${{ matrix.target }}/release/bundle"
          echo "::group::bundle tree at $BD"
          if [ -d "$BD" ]; then
            ls -laR "$BD"
          else
            echo "(no bundle dir produced)"
            exit 1
          fi
          echo "::endgroup::"

      - name: collect platform artifacts
        shell: bash
        run: |
          set -euo pipefail
          OUT="staging/${{ matrix.label }}"
          mkdir -p "$OUT"
          BD="backends/target/${{ matrix.target }}/release/bundle"
          # 用 find -exec 而不是 glob，避免任何文件名静默 miss。
          # macOS：*.dmg、*.app.tar.gz(.sig)
          # Windows：*-setup.exe(.sig)（Tauri 2 默认模式直接签 .exe，不再产 .nsis.zip）
          find "$BD" -type f \
            \( -name '*.dmg' \
               -o -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \
               -o -name '*-setup.exe' -o -name '*-setup.exe.sig' \) \
            -exec cp -v {} "$OUT"/ \;
          echo "::group::collected artifacts in $OUT"
          ls -la "$OUT"
          echo "::endgroup::"

          # Sanity guard：每平台都必须有签名文件，否则 updater 没法用
          case "${{ matrix.label }}" in
            macos-*)
              ls "$OUT"/*.app.tar.gz.sig >/dev/null 2>&1 \
                || { echo "::error::missing *.app.tar.gz.sig — 检查 TAURI_SIGNING_PRIVATE_KEY 是否配置正确"; exit 1; }
              ;;
            windows-*)
              ls "$OUT"/*-setup.exe.sig >/dev/null 2>&1 \
                || { echo "::error::missing *-setup.exe.sig — 检查 TAURI_SIGNING_PRIVATE_KEY 是否配置正确"; exit 1; }
              ;;
          esac

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: staging/${{ matrix.label }}
          if-no-files-found: error
          retention-days: 7

  package:
    needs: [verify, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-staging/bundles
          # no `name`: download all artifacts; each lands in release-staging/bundles/<artifact-name>/

      - name: generate latest.json
        env:
          OSS_BUNDLE_BASE_URL: ${{ vars.OSS_BUNDLE_BASE_URL }}
        shell: bash
        run: |
          set -euo pipefail
          BASE="${OSS_BUNDLE_BASE_URL:-https://REPLACE-ME.oss-cn-hangzhou.aliyuncs.com/releases}"
          if [ "$BASE" = "https://REPLACE-ME.oss-cn-hangzhou.aliyuncs.com/releases" ]; then
            echo "::warning::OSS_BUNDLE_BASE_URL not set as repo Variable; using placeholder. Patch latest.json before upload, or set the Variable and rerun."
          fi
          node scripts/make-latest-json.mjs release-staging "$BASE"
          cat release-staging/latest.json

      - name: bundle release zip
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          ZIP="chathub-release-${VERSION}.zip"
          (cd release-staging && zip -r "../$ZIP" .)
          ls -la "$ZIP"

      - uses: actions/upload-artifact@v4
        with:
          name: chathub-release-${{ needs.verify.outputs.version }}
          path: chathub-release-${{ needs.verify.outputs.version }}.zip
          if-no-files-found: error
          retention-days: 30
