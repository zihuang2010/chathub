name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: verify versions agree (and match tag if pushed)
        id: v
        shell: bash
        run: |
          set -euo pipefail
          PKG_VER=$(node -p "require('./package.json').version")
          TAURI_VER=$(node -p "require('./backends/tauri.conf.json').version")
          CARGO_VER=$(grep -m1 '^version = ' backends/Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          echo "package.json:    $PKG_VER"
          echo "tauri.conf.json: $TAURI_VER"
          echo "Cargo.toml:      $CARGO_VER"

          if [ "$PKG_VER" != "$TAURI_VER" ] || [ "$PKG_VER" != "$CARGO_VER" ]; then
            echo "::error::version mismatch: package.json=$PKG_VER tauri.conf.json=$TAURI_VER Cargo.toml=$CARGO_VER (run: pnpm version:bump <semver>)"
            exit 1
          fi

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            TAG_VER="${GITHUB_REF_NAME#v}"
            if [ "$PKG_VER" != "$TAG_VER" ]; then
              echo "::error::tag $GITHUB_REF_NAME does not match version $PKG_VER (expected tag v$PKG_VER)"
              exit 1
            fi
            echo "tag $GITHUB_REF_NAME matches version $PKG_VER"
          else
            echo "manual dispatch: skipping tag/version match check"
          fi

          echo "version=$PKG_VER" >> "$GITHUB_OUTPUT"

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-14 是 Apple Silicon runner，arm64 原生构建
          - os: macos-14
            target: aarch64-apple-darwin
            label: macos-arm64
            bundles: "app,dmg"
          # 同样 macos-14 跑，cross-compile 到 x86_64（避开 macos-13 排队）
          - os: macos-14
            target: x86_64-apple-darwin
            label: macos-x86_64
            bundles: "app,dmg"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
            bundles: "nsis"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: backends -> target
          key: ${{ matrix.target }}

      - run: pnpm install --frozen-lockfile

      - name: tauri build
        env:
          # 编译期烘进客户端的 relay 地址(chathub-net/build.rs)。repo Variable，
          # 不是 secret：地址本就会进二进制。缺它则 build.rs 回落到 relay.example.com 占位串。
          CHATHUB_RELAY_URL: ${{ vars.CHATHUB_RELAY_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CHATHUB_RELAY_URL:-}" ]; then
            echo "::error::CHATHUB_RELAY_URL 未设置（缺 repo Variable）— 否则客户端烘进占位地址 relay.example.com，发出去的包连不上 relay。请在仓库 Settings → Variables 新建 CHATHUB_RELAY_URL"
            exit 1
          fi
          pnpm tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: list bundle dir (diagnostic)
        shell: bash
        run: |
          set -euo pipefail
          # workspace 改造后 tauri 产物落在仓库根 target/；改造前在 backends/target/。
          # 两处都查(同 server job 的探测思路)，避免路径假设再次失效。
          BD=""
          for d in "target/${{ matrix.target }}/release/bundle" \
                   "backends/target/${{ matrix.target }}/release/bundle"; do
            if [ -d "$d" ]; then BD="$d"; break; fi
          done
          if [ -z "$BD" ]; then
            echo "::error::no bundle dir produced (looked in target/ and backends/target/)"
            exit 1
          fi
          echo "::group::bundle tree at $BD"
          ls -laR "$BD"
          echo "::endgroup::"

      - name: collect platform artifacts
        shell: bash
        run: |
          set -euo pipefail
          OUT="staging/${{ matrix.label }}"
          mkdir -p "$OUT"
          # 同 diagnostic：tauri bundle 可能落在仓库根 target/ 或 backends/target/，两处都查。
          BD=""
          for d in "target/${{ matrix.target }}/release/bundle" \
                   "backends/target/${{ matrix.target }}/release/bundle"; do
            if [ -d "$d" ]; then BD="$d"; break; fi
          done
          if [ -z "$BD" ]; then
            echo "::error::no bundle dir produced (looked in target/ and backends/target/)"
            exit 1
          fi
          # 用 find -exec 而不是 glob，避免任何文件名静默 miss。
          # macOS：*.dmg、*.app.tar.gz(.sig)
          # Windows：*-setup.exe(.sig)（Tauri 2 默认模式直接签 .exe，不再产 .nsis.zip）
          find "$BD" -type f \
            \( -name '*.dmg' \
               -o -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \
               -o -name '*-setup.exe' -o -name '*-setup.exe.sig' \) \
            -exec cp -v {} "$OUT"/ \;
          echo "::group::collected artifacts in $OUT"
          ls -la "$OUT"
          echo "::endgroup::"

          # Sanity guard：每平台都必须有签名文件，否则 updater 没法用
          case "${{ matrix.label }}" in
            macos-*)
              ls "$OUT"/*.app.tar.gz.sig >/dev/null 2>&1 \
                || { echo "::error::missing *.app.tar.gz.sig — 检查 TAURI_SIGNING_PRIVATE_KEY 是否配置正确"; exit 1; }
              ;;
            windows-*)
              ls "$OUT"/*-setup.exe.sig >/dev/null 2>&1 \
                || { echo "::error::missing *-setup.exe.sig — 检查 TAURI_SIGNING_PRIVATE_KEY 是否配置正确"; exit 1; }
              ;;
          esac

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: staging/${{ matrix.label }}
          if-no-files-found: error
          retention-days: 7

  # 服务端组件:relay(常驻进程)+ mock(联调下游),静态 musl 二进制,x86_64 + arm64。
  # ring(rustls 后端)与 rusqlite bundled 含 C，aarch64-musl 需真实交叉工具链，故用 cross。
  server:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            label: linux-x86_64-musl
          - target: aarch64-unknown-linux-musl
            label: linux-arm64-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          key: server-${{ matrix.target }}

      # cross 用预制 Docker 镜像携带真实 musl 交叉工具链；ubuntu-latest 自带 Docker。
      - name: install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: build relay + mock (static musl)
        run: |
          cross build --release --locked --target ${{ matrix.target }} \
            -p chathub-relay --bin chathub-relay --bin chathub-mock-downstream

      - name: package binaries + checksums
        shell: bash
        env:
          VERSION: ${{ needs.verify.outputs.version }}
          TRIPLE: ${{ matrix.target }}
          LABEL: ${{ matrix.label }}
        run: |
          set -euo pipefail
          OUT="staging/${LABEL}"
          mkdir -p "$OUT"
          # cross 把产物写回宿主机 target/；workspace 根理论上是仓库根，
          # 但为防 tauri 那种 backends/target 解析差异，两处都查，缺则报错。
          locate_bin() {
            local bin="$1" d
            for d in "target/${TRIPLE}/release" "backends/target/${TRIPLE}/release"; do
              if [ -x "$d/$bin" ]; then printf '%s\n' "$d/$bin"; return 0; fi
            done
            return 1
          }
          for bin in chathub-relay chathub-mock-downstream; do
            src="$(locate_bin "$bin")" \
              || { echo "::error::missing built binary: $bin (looked in target/ and backends/target/)"; exit 1; }
            tar -C "$(dirname "$src")" -czf "$OUT/${bin}-${VERSION}-${TRIPLE}.tar.gz" "$bin"
          done
          ( cd "$OUT" && sha256sum *.tar.gz > SHA256SUMS )
          echo "::group::collected artifacts in $OUT"
          ls -la "$OUT"
          cat "$OUT/SHA256SUMS"
          echo "::endgroup::"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: staging/${{ matrix.label }}
          if-no-files-found: error
          retention-days: 7

  # Windows 版 relay + mock(供 Windows 本地联调)。上面的 server job 用 cross,
  # 其工具链是 Linux-musl 专用、无法目标 Windows,故单列一个 windows-latest 原生
  # cargo build 任务。产物随 release 包一同上传(make-latest-json 用固定平台表,
  # 不读这个目录,所以不影响 updater)。
  server-windows:
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: server-windows-x86_64

      - name: build relay + mock (windows-msvc)
        shell: bash
        run: |
          cargo build --release --locked --target x86_64-pc-windows-msvc \
            -p chathub-relay --bin chathub-relay --bin chathub-mock-downstream

      - name: package binaries + checksums
        shell: bash
        env:
          VERSION: ${{ needs.verify.outputs.version }}
          TRIPLE: x86_64-pc-windows-msvc
          LABEL: server-windows-x86_64
        run: |
          set -euo pipefail
          OUT="staging/${LABEL}"
          mkdir -p "$OUT"
          # 同 server job:产物可能落仓库根 target/ 或 backends/target/,两处都查。
          locate_bin() {
            local bin="$1" d
            for d in "target/${TRIPLE}/release" "backends/target/${TRIPLE}/release"; do
              if [ -f "$d/$bin" ]; then printf '%s\n' "$d/$bin"; return 0; fi
            done
            return 1
          }
          for bin in chathub-relay chathub-mock-downstream; do
            src="$(locate_bin "${bin}.exe")" \
              || { echo "::error::missing built binary: ${bin}.exe (looked in target/ and backends/target/)"; exit 1; }
            tar -C "$(dirname "$src")" -czf "$OUT/${bin}-${VERSION}-${TRIPLE}.tar.gz" "${bin}.exe"
          done
          ( cd "$OUT" && sha256sum *.tar.gz > SHA256SUMS )
          echo "::group::collected artifacts in $OUT"
          ls -la "$OUT"
          cat "$OUT/SHA256SUMS"
          echo "::endgroup::"

      - uses: actions/upload-artifact@v4
        with:
          name: server-windows-x86_64
          path: staging/server-windows-x86_64
          if-no-files-found: error
          retention-days: 7

  package:
    needs: [verify, build, server, server-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-staging/bundles
          # no `name`: download all artifacts; each lands in release-staging/bundles/<artifact-name>/

      - name: generate latest.json
        env:
          OSS_BUNDLE_BASE_URL: ${{ vars.OSS_BUNDLE_BASE_URL }}
        shell: bash
        run: |
          set -euo pipefail
          BASE="${OSS_BUNDLE_BASE_URL:-https://jdd-rh-test1.oss-cn-zhangjiakou.aliyuncs.com/chathub-releases}"
          if [ "$BASE" = "https://jdd-rh-test1.oss-cn-zhangjiakou.aliyuncs.com/chathub-releases" ]; then
            echo "::warning::OSS_BUNDLE_BASE_URL not set as repo Variable; using placeholder. Patch latest.json before upload, or set the Variable and rerun."
          fi
          node scripts/make-latest-json.mjs release-staging "$BASE"
          cat release-staging/latest.json

      - name: bundle release zip
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          ZIP="chathub-release-${VERSION}.zip"
          (cd release-staging && zip -r "../$ZIP" .)
          ls -la "$ZIP"

      - uses: actions/upload-artifact@v4
        with:
          name: chathub-release-${{ needs.verify.outputs.version }}
          path: chathub-release-${{ needs.verify.outputs.version }}.zip
          if-no-files-found: error
          retention-days: 30
